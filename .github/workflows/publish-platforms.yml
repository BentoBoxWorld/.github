# Reusable workflow: publish a built addon jar to Hangar and/or CurseForge.
#
# LOCATION: commit this to the org-wide ".github" repo at:
#   bentoboxworld/.github/.github/workflows/publish-platforms.yml
#
# Each addon repo calls it (see publish.yml). It builds with Maven, then
# uploads the resulting jar to Hangar (raw API) and CurseForge (raw upload API).
# A platform is skipped automatically when its id/slug input is left blank,
# so the same workflow serves Hangar-only, CF-only, or both.

name: Publish to platforms

on:
  workflow_call:
    inputs:
      hangar_slug:
        description: "Hangar project slug (e.g. AOneBlock, SkyBlock-BSkyBlock). Blank = skip Hangar."
        type: string
        default: ""
      hangar_owner:
        description: "Hangar owner namespace."
        type: string
        default: "BentoBoxWorld"
      curseforge_id:
        description: "CurseForge numeric project id. Blank = skip CurseForge."
        type: string
        default: ""
      curseforge_version_type_id:
        description: "CurseForge gameVersionTypeID to resolve MC version names under. 1 = the flat Minecraft type used by Bukkit/Paper plugin projects (the per-version mod types are rejected as 'invalid dependency')."
        type: string
        default: "1"
      game_versions:
        description: "Comma-separated Minecraft versions, e.g. 1.21.5,1.21.6,1.21.7"
        type: string
        required: true
      paper_versions:
        description: "Hangar PAPER platform versions. Defaults to game_versions when blank."
        type: string
        default: ""
      java_version:
        description: "JDK version to build with."
        type: string
        default: "21"
      build_tool:
        description: "maven or gradle."
        type: string
        default: "maven"
      use_release_asset:
        description: "true = download the jar already attached to the GitHub release instead of rebuilding from source. Avoids dependency-repo outages breaking publishing."
        type: string
        default: "false"
      release_asset_pattern:
        description: "Glob for the asset to download from the release (only when use_release_asset=true)."
        type: string
        default: "*.jar"
      jar_glob:
        description: "Glob for the release jar. Blank = auto (Maven target/*.jar, Gradle build/libs/*.jar)."
        type: string
        default: ""
      channel:
        description: "Hangar release channel."
        type: string
        default: "Release"
      version:
        description: "Override version (for manual workflow_dispatch runs). Blank = read from the release tag."
        type: string
        default: ""
    secrets:
      HANGAR_API_KEY:
        required: false
      CURSEFORGE_TOKEN:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build from source (default). Skipped when reusing the release asset, so a
      # dependency-repo outage can't block a release that already has a built jar.
      - name: Set up JDK
        if: ${{ inputs.use_release_asset != 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}
          cache: ${{ inputs.build_tool == 'gradle' && 'gradle' || 'maven' }}

      - name: Build
        if: ${{ inputs.use_release_asset != 'true' }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.build_tool }}" = "gradle" ]; then
            chmod +x ./gradlew || true
            ./gradlew build -x test --no-daemon
          else
            mvn -B -DskipTests package
          fi

      # Reuse the jar already attached to the GitHub release instead of rebuilding.
      - name: Download release asset
        if: ${{ inputs.use_release_asset == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.version }}"
          if [ -z "$TAG" ]; then TAG="${{ github.event.release.tag_name }}"; fi
          if [ -z "$TAG" ]; then echo "::error::No tag (no version input and no release tag) to download the asset from"; exit 1; fi
          mkdir -p release-assets
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "${{ inputs.release_asset_pattern }}" \
            --dir release-assets
          echo "Downloaded release asset(s) for $TAG:"
          ls -l release-assets

      - name: Resolve version and jar
        id: meta
        run: |
          set -euo pipefail
          # Version: explicit input (manual runs) wins, else the release tag.
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="${{ github.event.release.tag_name }}"; fi
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then echo "::error::No version (no version input and no release tag)"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Pick the release jar. Use jar_glob if given, else default by source:
          # the downloaded release asset, or the build output dir for the build tool.
          GLOB="${{ inputs.jar_glob }}"
          if [ -z "$GLOB" ]; then
            if [ "${{ inputs.use_release_asset }}" = "true" ]; then GLOB="release-assets/*.jar";
            elif [ "${{ inputs.build_tool }}" = "gradle" ]; then GLOB="build/libs/*.jar";
            else GLOB="target/*.jar"; fi
          fi
          JAR=$(ls -1t $GLOB 2>/dev/null \
            | grep -Ev 'original-|-sources|-javadoc|-part' \
            | head -n1)
          if [ -z "$JAR" ]; then echo "::error::No jar matched $GLOB"; exit 1; fi
          echo "jar=$JAR" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION jar=$JAR"

          # Changelog = release body (falls back to a generic line).
          BODY=${{ toJSON(github.event.release.body) }}
          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then BODY="Release $VERSION"; fi
          # store via env file to preserve newlines
          {
            echo "changelog<<__EOF__"
            echo "$BODY"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      # Detect which credentials are present. `secrets` can't be used in `if:`,
      # so we surface their presence as step outputs and gate on those instead.
      - name: Detect credentials
        id: creds
        env:
          HANGAR_API_KEY: ${{ secrets.HANGAR_API_KEY }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          if [ -n "${HANGAR_API_KEY:-}" ]; then echo "hangar=true" >> "$GITHUB_OUTPUT"; else echo "hangar=false" >> "$GITHUB_OUTPUT"; fi
          if [ -n "${CURSEFORGE_TOKEN:-}" ]; then echo "curseforge=true" >> "$GITHUB_OUTPUT"; else echo "curseforge=false" >> "$GITHUB_OUTPUT"; fi

      # ---------------------------------------------------------------- Hangar
      - name: Publish to Hangar
        if: ${{ inputs.hangar_slug != '' && steps.creds.outputs.hangar == 'true' }}
        env:
          HANGAR_API_KEY: ${{ secrets.HANGAR_API_KEY }}
          OWNER: ${{ inputs.hangar_owner }}
          SLUG: ${{ inputs.hangar_slug }}
          VERSION: ${{ steps.meta.outputs.version }}
          JAR: ${{ steps.meta.outputs.jar }}
          CHANNEL: ${{ inputs.channel }}
          GAME_VERSIONS: ${{ inputs.game_versions }}
          PAPER_VERSIONS: ${{ inputs.paper_versions }}
          CHANGELOG: ${{ steps.meta.outputs.changelog }}
        run: |
          set -euo pipefail
          PV="${PAPER_VERSIONS:-$GAME_VERSIONS}"

          # 1. Exchange the API key for a short-lived JWT.
          JWT=$(curl -fsS -X POST \
            "https://hangar.papermc.io/api/v1/authenticate?apiKey=${HANGAR_API_KEY}" \
            | jq -r '.token')
          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then echo "::error::Hangar auth failed"; exit 1; fi

          # 2. Build the versionUpload JSON.
          PAPER_JSON=$(echo "$PV" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$";""))')
          UPLOAD=$(jq -n \
            --arg v "$VERSION" \
            --arg ch "$CHANNEL" \
            --arg desc "$CHANGELOG" \
            --argjson paper "$PAPER_JSON" \
            '{version:$v, channel:$ch, description:$desc,
              pluginDependencies:{},
              platformDependencies:{PAPER:$paper},
              files:[{platforms:["PAPER"]}]}')

          # 3. Upload (versionUpload part + the jar as the files part).
          HTTP=$(curl -sS -o hangar_resp.json -w '%{http_code}' -X POST \
            "https://hangar.papermc.io/api/v1/projects/${OWNER}/${SLUG}/upload" \
            -H "Authorization: ${JWT}" \
            -F "versionUpload=${UPLOAD};type=application/json" \
            -F "files=@${JAR}")
          echo "Hangar HTTP $HTTP; response: $(cat hangar_resp.json 2>/dev/null)"
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "::error::Hangar upload failed (HTTP $HTTP): $(cat hangar_resp.json 2>/dev/null)"
            exit 1
          fi
          echo "Hangar: published ${SLUG} ${VERSION}"

      # ------------------------------------------------------------ CurseForge
      - name: Publish to CurseForge
        if: ${{ inputs.curseforge_id != '' && steps.creds.outputs.curseforge == 'true' }}
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CF_ID: ${{ inputs.curseforge_id }}
          JAR: ${{ steps.meta.outputs.jar }}
          GAME_VERSIONS: ${{ inputs.game_versions }}
          CF_VERSION_TYPE_ID: ${{ inputs.curseforge_version_type_id }}
          CHANGELOG: ${{ steps.meta.outputs.changelog }}
        run: |
          set -euo pipefail

          # 1. Map MC version names -> CurseForge numeric gameVersion ids.
          #    Each MC version exists under several gameVersionTypeIDs (per-version mod
          #    types, "addons", etc.); a plugin project only accepts ids under the flat
          #    Minecraft type (id 1) - the others fail with "invalid dependency". So
          #    resolve names within CF_VERSION_TYPE_ID, not just the first name match.
          curl -fsS -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
            "https://minecraft.curseforge.com/api/game/versions" > cf_versions.json
          IDS=()
          for v in ${GAME_VERSIONS//,/ }; do
            id=$(jq -r --arg n "$v" --argjson t "$CF_VERSION_TYPE_ID" \
              '.[] | select(.name==$n and .gameVersionTypeID==$t) | .id' cf_versions.json | head -n1)
            if [ -n "$id" ] && [ "$id" != "null" ]; then
              IDS+=("$id")
            else
              echo "::warning::CurseForge has no game version id for '$v' under type ${CF_VERSION_TYPE_ID} (skipped)"
            fi
          done
          if [ ${#IDS[@]} -eq 0 ]; then echo "::error::No CurseForge game versions resolved"; exit 1; fi
          GV=$(printf '%s\n' "${IDS[@]}" | jq -s '.')

          # 2. Upload. CurseForge rejects a whole upload (error 1009) when ANY single
          #    gameVersion id isn't valid for plugin uploads yet - e.g. a brand-new MC
          #    version that has a tag but isn't enabled for the project's game. Rather
          #    than fail the release, drop the offending id and retry, so the jar still
          #    publishes against every version CurseForge does accept.
          echo "CurseForge gameVersion ids: $(echo "$GV" | jq -c '.')"
          for attempt in $(seq 1 25); do
            META=$(jq -n \
              --arg cl "$CHANGELOG" \
              --argjson gv "$GV" \
              '{changelog:$cl, changelogType:"markdown", releaseType:"release", gameVersions:$gv}')
            HTTP=$(curl -sS -o cf_resp.json -w '%{http_code}' -X POST \
              "https://minecraft.curseforge.com/api/projects/${CF_ID}/upload-file" \
              -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
              -F "metadata=${META};type=application/json" \
              -F "file=@${JAR}")
            BODY=$(cat cf_resp.json 2>/dev/null)
            if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
              echo "CurseForge: uploaded to project ${CF_ID}"
              exit 0
            fi
            echo "CurseForge HTTP $HTTP; response: $BODY"
            # Error 1009 names a single bad id ("Invalid game version ID: 16498 ..."). Drop it and retry.
            BADID=$(echo "$BODY" | jq -r 'select(.errorCode==1009) | .errorMessage | capture("ID: (?<id>[0-9]+)") | .id' 2>/dev/null)
            if [ -z "$BADID" ]; then
              echo "::error::CurseForge upload failed (HTTP $HTTP): $BODY"
              exit 1
            fi
            echo "::warning::CurseForge rejected game version id $BADID; dropping it and retrying"
            GV=$(echo "$GV" | jq --argjson b "$BADID" 'map(select(. != $b))')
            if [ "$(echo "$GV" | jq 'length')" -eq 0 ]; then
              echo "::error::CurseForge rejected every game version id; nothing left to publish against"
              exit 1
            fi
          done
          echo "::error::CurseForge upload still failing after dropping rejected versions"
          exit 1
